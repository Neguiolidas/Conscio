<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conscio Hub</title>
<link rel="stylesheet" href="/static/style.css">
<main>
  <h1>🧠 Conscio Hub <small id="version"></small></h1>

  <!-- Brain Config -->
  <section id="sec-brain">
    <h2>Active Brain</h2>
    <label><span>Provider</span>
      <select id="provider"></select>
    </label>
    <label><span>API Key</span>
      <input id="api-key" type="password" autocomplete="off" placeholder="sk-… or your provider key">
      <span class="hint">Stored as environment variable on save — never echoed back</span>
    </label>
    <label id="base-url-row" style="display:none"><span>Base URL</span>
      <input id="base-url" type="url" autocomplete="off" placeholder="https://api.example.com/v1">
    </label>
    <label><span>Model</span>
      <div style="position:relative">
        <input id="model" list="models" autocomplete="off">
        <datalist id="models"></datalist>
      </div>
      <span class="hint" id="models-indicator"></span>
    </label>
    <div style="display:flex;gap:8px;margin-top:4px;align-items:center">
      <button id="test">Test Connection</button>
      <span id="testResult"></span>
      <button id="save">Save</button>
      <span class="hint">↻ takes effect next session</span>
    </div>
  </section>

  <!-- Providers -->
  <section id="sec-providers">
    <h2>Providers</h2>
    <ul id="providers" style="list-style:none;font-size:.85rem"></ul>
  </section>

  <!-- Daemon control (only when --enable-daemon-control) -->
  <section id="sec-daemon" style="display:none">
    <h2>Daemon</h2>
    <label style="display:flex;gap:8px;align-items:center">
      <input id="awake" type="checkbox">
      <span>Awake (autonomous) — applied next daemon cycle</span>
    </label>
    <span class="hint">Requires <code>conscio-daemon --watch-control</code>.
      Awake makes an act-capable daemon autonomous.</span>
    <span id="awakeResult" class="hint"></span>
  </section>
</main>
<script src="/static/app.js"></script>
