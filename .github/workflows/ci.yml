name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # House rule: one test file per pytest process (mirrors the local
      # RAM constraint and keeps per-file isolation honest).
      - name: Run tests (one file at a time)
        run: |
          set -euo pipefail
          for f in tests/test_*.py; do
            echo "── $f"
            python -m pytest "$f" -q --tb=short --cov=conscio --cov-append -p no:cacheprovider \
              || { rc=$?; [ "$rc" -eq 5 ] && echo "  (no tests collected — ok)" || exit "$rc"; }
          done
          python -m coverage report --skip-covered

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff check
        run: ruff check conscio/ tests/

      - name: MyPy type check
        run: mypy conscio/ --ignore-missing-imports

  # Build smoke: catch a packaging regression on every push, not at tag time.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel + sdist and check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
