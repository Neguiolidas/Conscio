name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Gate: the same discipline as CI — per-file test loop + lint + types — must
  # pass before anything is built or published.
  gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests (one file at a time)
        run: |
          set -euo pipefail
          for f in tests/test_*.py; do
            echo "── $f"
            python -m pytest "$f" -q --tb=short -p no:cacheprovider \
              || { rc=$?; [ "$rc" -eq 5 ] && echo "  (no tests collected — ok)" || exit "$rc"; }
          done
      - name: Lint + types
        run: |
          ruff check conscio/ tests/
          pyright conscio/

  build:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build + check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # OIDC trusted publishing — no API token stored
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      # Publish is retried up to 3x. Root cause of past failures wasn't OIDC/
      # trusted-publisher config (that part always worked) — it was
      # ConnectionResetError talking to sigstore's Fulcio/Rekor during PEP 740
      # attestation signing, a transient network blip. skip-existing makes
      # retries safe if a prior attempt already uploaded the file before
      # failing on the attestation step.
      - name: Publish to PyPI (attempt 1)
        id: publish1
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          skip-existing: true

      - name: Wait before retry 2
        if: steps.publish1.outcome == 'failure'
        run: sleep 30

      - name: Publish to PyPI (attempt 2)
        id: publish2
        if: steps.publish1.outcome == 'failure'
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          skip-existing: true

      - name: Wait before retry 3
        if: steps.publish1.outcome == 'failure' && steps.publish2.outcome == 'failure'
        run: sleep 60

      - name: Publish to PyPI (attempt 3)
        if: steps.publish1.outcome == 'failure' && steps.publish2.outcome == 'failure'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
