name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Gate: the same discipline as CI — per-file test loop + lint + types — must
  # pass before anything is built or published.
  gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests (one file at a time)
        run: |
          set -euo pipefail
          for f in tests/test_*.py; do
            echo "── $f"
            python -m pytest "$f" -q --tb=short -p no:cacheprovider \
              || { rc=$?; [ "$rc" -eq 5 ] && echo "  (no tests collected — ok)" || exit "$rc"; }
          done
      - name: Lint + types
        run: |
          ruff check conscio/ tests/
          pyright conscio/

  build:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build + check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # OIDC trusted publishing — no API token stored
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
